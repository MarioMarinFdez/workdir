## NECESITAIS UN BIND MOUNT!

version: '3.8'

services:

  fastapi:
    build:
      context: .
      dockerfile: fastapi/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - deploy_network
    container_name: fastapi
    volumes:
      - db_data:/app/data

  streamlit:
    build:
      context: streamlit/
      dockerfile: Dockerfile
    depends_on:
      - fastapi
    ports:
      - "8501:8501"
    networks:
      - deploy_network
    container_name: streamlit

networks:
  deploy_network:
    driver: bridge

volumes:
  db_data:
