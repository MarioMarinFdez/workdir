name: CI - Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install fastapi sqlalchemy pytest pytest-cov httpx
          pip install -r fastapi/requirements.txt

      - name: Ejecutar tests con cobertura
        run: |
          cd fastapi
          PYTHONPATH=.. pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Tests Streamlit utils
        run: |
          cd streamlit
          pytest utils/test/ -v
